syntax = "proto3";

package grouppb;

option go_package = "IM2/pkg/proto/group";

// 群组信息
message GroupInfo {
  uint64 id = 1;                  // 群组ID
  uint64 owner_id = 2;            // 群主ID
  string name = 3;                // 群组名称
  string avatar = 4;              // 群头像
  string notice = 5;              // 群公告
  JoinType join_type = 6;         // 加群方式
  int32 member_count = 7;         // 成员数量
  int64 create_time = 8;          // 创建时间
  int64 update_time = 9;          // 更新时间
}

// 群成员信息
message GroupMember {
  uint64 group_id = 1;            // 群组ID
  uint64 user_id = 2;             // 用户ID
  GroupRole role = 3;             // 群角色
  string nickname = 4;            // 群昵称
  int64 mute_until = 5;           // 禁言截止时间
  int64 joined_at = 8;            // 加入时间
  string extra = 9;               // 扩展字段
}

enum GroupRole {
  GROUP_ROLE_UNSPECIFIED = 0;     // 未知
  GROUP_ROLE_OWNER = 1;           // 群主
  GROUP_ROLE_ADMIN = 2;           // 管理员
  GROUP_ROLE_MEMBER = 3;          // 普通成员
}

enum JoinType {
  JOIN_TYPE_UNSPECIFIED = 0;
  JOIN_TYPE_AFTER_APPROVAL = 1;   // 同意后加入
  JOIN_TYPE_DIRECT = 2;           // 直接加入
}
syntax = "proto3";

package svc;

option go_package = "IM2/pkg/proto/svc";

// 服务间通信扩展，当前为空，待后续增加

message ErrorResp {
    int32 code = 1;
    string message = 2;
    string rawError = 3;
}

message UserGroupSync {
  uint64 user_id = 1;
  repeated uint64 group_ids = 2;
}

message MessageSend {
  string client_id = 1;
  string session_id = 2;
  string session_key = 3;
  uint64 sender = 4;
  uint64 target = 5;
  int64 msg_type = 6;
  int64 timestamp = 7;
  string preview = 8;
  bytes payload = 9;
  // 投递目标快照：群操作通知（踢人/退群/解散）的目标在操作后已不在成员列表，
  // 由发布方携带操作前成员快照；为空时消费方按当前成员列表扇出。
  repeated uint64 deliver_to = 10;
}


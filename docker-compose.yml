version: '3.8'

services:
  # ---------------
  # 基础设施 (Infrastructure)
  # ---------------
  mysql:
    image: mysql:8.0
    container_name: im2_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: im
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 挂载初始化脚本目录：MySQL 首次启动时会自动执行该目录下的所有 .sql 文件
      - ./mysql:/docker-entrypoint-initdb.d
    restart: always

  redis:
    image: redis:7.0-alpine
    container_name: im2_redis
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis:/usr/local/etc/redis
    restart: always

  mongodb:
    image: mongo:6.0
    container_name: im2_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  etcd:
    image: bitnami/etcd:3.5
    container_name: im2_etcd
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISE_CLIENT_URLS=http://0.0.0.0:2379
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd_data:/bitnami/etcd/data
    restart: always

  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: im2_nacos
    environment:
      - PREFER_HOST_MODE=hostname
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql
      - MYSQL_SERVICE_DB_NAME=nacos
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_USER=root
      - MYSQL_SERVICE_PASSWORD=root
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      - mysql
    restart: always

  nats:
    image: nats:2.9-alpine
    container_name: im2_nats
    ports:
      - "4222:4222"
      - "8222:8222" # monitoring interface
    restart: always

volumes:
  mysql_data:
  redis_data:
  mongo_data:
  etcd_data:

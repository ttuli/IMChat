syntax = "proto3";

package types;

option go_package = "./;types";

// Message
message Message {
  // @gotags: json:"msg_id"
  string msg_id = 1;
  // @gotags: json:"client_id"
  string client_id = 2;
  // @gotags: json:"session_id"
  string session_id = 3;
  // @gotags: json:"from_user_id"
  uint64 from_user_id = 4;
  // @gotags: json:"msg_type"
  int32 msg_type = 5;
  // @gotags: json:"seq"
  uint64 seq = 6;
  // @gotags: json:"content"
  string content = 7;
  // @gotags: json:"media_url"
  string media_url = 8;
  // @gotags: json:"extra"
  string extra = 9;
  // @gotags: json:"status"
  int32 status = 10;
  // @gotags: json:"create_time"
  int64 create_time = 11;
}

message Session {
  // @gotags: json:"session_id"
  string session_id = 1;
  // @gotags: json:"type"
  int32 type = 2;
  // @gotags: json:"session_key"
  string session_key = 3;
  // @gotags: json:"max_seq"
  uint64 max_seq = 4;
  // @gotags: json:"actual_seq"
  uint64 actual_seq = 5;
  // @gotags: json:"last_content"
  string last_content = 6;
  // @gotags: json:"last_sender"
  uint64 last_sender = 7;
  // @gotags: json:"create_time"
  int64 create_time = 8;
  // @gotags: json:"update_time"
  int64 update_time = 9;
}

// UserSession
message UserSession {
  // @gotags: json:"user_id"
  uint64 user_id = 1;
  // @gotags: json:"session_id"
  string session_id = 2;
  // @gotags: json:"is_top"
  int32 is_top = 3;
  // @gotags: json:"is_disturb"
  int32 is_disturb = 4;
  // @gotags: json:"last_read_seq"
  uint64 last_read_seq = 5;
  // @gotags: json:"create_time"
  int64 create_time = 6;
  // @gotags: json:"update_time"
  int64 update_time = 8;
  // @gotags: json:"unread_count"
  uint64 unread_count = 9;
}

// GetHistoryReq
message GetHistoryReq {
  // @gotags: form:"session_id,optional" json:"session_id,optional"
  string session_id = 1;
  // @gotags: form:"start_seq,optional" json:"start_seq,optional"
  int64 start_seq = 2;
  // @gotags: form:"end_seq,optional" json:"end_seq,optional"
  int64 end_seq = 3;
  // @gotags: form:"limit,optional,default=20" json:"limit,optional"
  int32 limit = 4;
}

// GetHistoryResp
message GetHistoryResp {
  // @gotags: json:"list"
  repeated Message list = 1;
}

// UpdateSessionReq
message UpdateSessionReq {
  // @gotags: json:"session_id"
  string session_id = 1;
  // @gotags: json:"is_top,optional"
  int32 is_top = 2;
  // @gotags: json:"is_disturb,optional"
  int32 is_disturb = 3;
}

// GetUserSessionsResp
message GetUserSessionsResp {
  // @gotags: json:"sessions"
  repeated UserSession sessions = 1;
}

message GetUserActiveSessionsReq {
  // @gotags: form:"timestamp,optional" json:"timestamp,optional"
  int64 timestamp = 1;
}

message GetUserActiveSessionsResp {
  // @gotags: json:"sessions"
  repeated Session sessions = 1;
}

// MarkSessionReadReq 上报会话已读游标
message MarkSessionReadReq {
  // @gotags: json:"session_id"
  string session_id = 1;
  // @gotags: json:"read_seq"
  uint64 read_seq = 2;
}

// GetSessionReq 根据 session_id 或 session_key 查询会话
message GetSessionReq {
  // @gotags: form:"session_id,optional" json:"session_id,optional"
  string session_id = 1;
  // @gotags: form:"session_key,optional" json:"session_key,optional"
  string session_key = 2;
  // @gotags: form:"session_type,optional" json:"session_type,optional"
  int32 session_type = 3;
}

// GetSessionResp
message GetSessionResp {
  // @gotags: json:"session"
  Session session = 1;
}
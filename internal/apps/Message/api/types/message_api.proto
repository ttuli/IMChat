syntax = "proto3";

package types;

option go_package = "./;types";

// Message
message Message {
  // @gotags: json:"msg_id"
  string msg_id = 1;
  // @gotags: json:"client_id"
  string client_id = 2;
  // @gotags: json:"conversation_id"
  string conversation_id = 3;
  // @gotags: json:"from_user_id"
  uint64 from_user_id = 4;
  // @gotags: json:"msg_type"
  int32 msg_type = 5;
  // @gotags: json:"seq"
  uint64 seq = 6;
  // @gotags: json:"content"
  string content = 7;
  // @gotags: json:"media_url"
  string media_url = 8;
  // @gotags: json:"extra"
  string extra = 9;
  // @gotags: json:"status"
  int32 status = 10;
  // @gotags: json:"create_time"
  int64 create_time = 11;
}

message Conversation {
    string conversation_id = 1;
    int32 conversation_type = 2;
    int64 max_seq = 3;
    int64 create_time = 4;
    int64 update_time = 5;
    string last_content = 6;
    uint64 last_sender = 7;
}

// UserConversation
message UserConversation {
  // @gotags: json:"user_id"
  uint64 user_id = 1;
  // @gotags: json:"conversation_id"
  string conversation_id = 2;
  // @gotags: json:"is_top"
  bool is_top = 3;
  // @gotags: json:"is_disturb"
  bool is_disturb = 4;
  // @gotags: json:"is_mute"
  bool is_mute = 5;
  // @gotags: json:"last_read_seq"
  uint64 last_read_seq = 6;
  // @gotags: json:"create_time"
  int64 create_time = 7;
  // @gotags: json:"update_time"
  int64 update_time = 8;
}

// GetHistoryReq
message GetHistoryReq {
  // @gotags: form:"conversation_id,optional" json:"conversation_id,optional"
  string conversation_id = 1;
  // @gotags: form:"start_seq,optional" json:"start_seq,optional"
  int64 start_seq = 2;
  // @gotags: form:"end_seq,optional" json:"end_seq,optional"
  int64 end_seq = 3;
  // @gotags: form:"limit,optional,default=20" json:"limit,optional"
  int32 limit = 4;
}

// GetHistoryResp
message GetHistoryResp {
  // @gotags: json:"list"
  repeated Message list = 1;
}

// ReadMessageReq
message ReadMessageReq {
  // @gotags: json:"conversation_id"
  string conversation_id = 1;
  // @gotags: json:"seq"
  uint64 seq = 2;
}

// UpdateConversationReq
message UpdateConversationReq {
  // @gotags: json:"conversation_id"
  string conversation_id = 1;
  // @gotags: json:"is_top,optional"
  int32 is_top = 2;
  // @gotags: json:"is_disturb,optional"
  int32 is_disturb = 3;
  // @gotags: json:"is_mute,optional"
  int32 is_mute = 4;
}

// GetUserConversationsResp
message GetUserConversationsResp {
  // @gotags: json:"conversations"
  repeated UserConversation conversations = 1;
}

message GetUserActiveConversationsReq {
  // @gotags: form:"timestamp,optional" json:"timestamp,optional"
  int64 timestamp = 1;
}

message GetUserActiveConversationsResp {
  // @gotags: json:"conversations"
  repeated Conversation conversations = 1;
}

message RecallMessageReq {
  // @gotags: json:"msg_id"
  string msg_id = 1;
  // @gotags: json:"session_id"
  string session_id = 2;
}
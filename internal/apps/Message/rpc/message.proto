syntax = "proto3";

package message;

option go_package = "./message";

// ========== 消息定义 ==========

message Message {
  string msg_id = 1;
  string client_id = 2;
  string conversation_id = 3;
  uint64 from_user_id = 4;
  int32 msg_type = 5;
  uint64 seq = 6;
  string content = 7;
  string media_url = 8;
  string extra = 9;
  int32 status = 10;
  int64 create_time = 11;
}

message Conversation {
  string conversation_id = 1;
  int32 type = 2;
  uint64 max_seq = 3;
  int64 create_time = 4;
  int64 update_time = 5;
}

message UserConversation {
  uint64 user_id = 1;
  string conversation_id = 2;
  bool is_top = 3;
  bool is_disturb = 4;
  bool is_mute = 5;
  uint64 last_read_seq = 6;
  int64 create_time = 7;
  int64 update_time = 8;
}

// ========== 请求/响应 ==========

message GetHistoryReq {
  string conversation_id = 1;
  uint64 cursor_seq = 2; // 上一次拉取的seq，首次传0(最新)
  int32 limit = 3;
  bool forward = 4;      // true: 向旧消息拉取(History), false: 向新消息拉取(Sync)
}

message GetHistoryResp {
  repeated Message messages = 1;
}

message GetConversationListReq {
  repeated string session_ids = 1;
}

message GetConversationListResp {
  repeated Conversation conversations = 1;
}

message GetUserConversationsReq {
  uint64 user_id = 1;
}

message GetUserConversationsResp {
  repeated UserConversation conversations = 1;
}


message ReadMessageReq {
  uint64 user_id = 1;
  string conversation_id = 2;
  uint64 seq = 3;        // 读到的seq
}

message ReadMessageResp {}

message UpdateConversationReq {
  uint64 user_id = 1;
  string conversation_id = 2;
  int32 is_top = 3;      // 0:不变更 1:置顶 2:取消置顶
  int32 is_disturb = 4;  // 0:不变更 1:免打扰 2:取消免打扰
  int32 is_mute = 5;     // 0:不变更 1:静音 2:取消静音
}

message UpdateConversationResp {}

// ========== 服务定义 ==========

service MessageRpc {
  rpc GetHistory(GetHistoryReq) returns (GetHistoryResp);
  rpc GetConversationList(GetConversationListReq) returns (GetConversationListResp);
  rpc ReadMessage(ReadMessageReq) returns (ReadMessageResp);
  rpc UpdateConversation(UpdateConversationReq) returns (UpdateConversationResp);
  rpc GetUserConversations(GetUserConversationsReq) returns (GetUserConversationsResp);
}
syntax = "proto3";

package types;

option go_package = "./;types";

// UserInfo
message UserInfo {
  // @gotags: json:"user_id"
  uint64 user_id = 1;
  // @gotags: json:"user_name"
  string user_name = 2;
  // @gotags: json:"avatar"
  string avatar = 3;
  // @gotags: json:"gender"
  int32 gender = 4;
  // @gotags: json:"phone"
  string phone = 5;
  // @gotags: json:"join_type"
  int32 join_type = 6;
  // @gotags: json:"personal_signature"
  string personal_signature = 7;
  // @gotags: json:"status"
  int32 status = 8;
  // @gotags: json:"create_time"
  int64 create_time = 9;
  // @gotags: json:"update_time"
  int64 update_time = 10;
}

// Friend
message Friend {
  // @gotags: json:"user_id"
  uint64 user_id = 1;
  // @gotags: json:"friend_id"
  uint64 friend_id = 2;
  // @gotags: json:"remark"
  string remark = 3;
  // @gotags: json:"source"
  int32 source = 4;
  // @gotags: json:"blocked"
  bool blocked = 5;
  // @gotags: json:"starred"
  bool starred = 6;
  // @gotags: json:"create_time"
  int64 create_time = 7;
  // @gotags: json:"extra"
  string extra = 8;
}

// FriendRequest
message FriendRequest {
  // @gotags: json:"request_id"
  uint64 request_id = 1;
  // @gotags: json:"from_user_id"
  uint64 from_user_id = 2;
  // @gotags: json:"to_user_id"
  uint64 to_user_id = 3;
  // @gotags: json:"apply_msg"
  string apply_msg = 4;
  // @gotags: json:"status"
  int32 status = 5;
  // @gotags: json:"source"
  int32 source = 6;
  // @gotags: json:"request_time"
  int64 request_time = 7;
  // @gotags: json:"handle_time"
  int64 handle_time = 8;
  // @gotags: json:"reject_reason"
  string reject_reason = 9;
}

// GetUserInfoReq
message GetUserInfoReq {
  // @gotags: form:"ids,optional" json:"ids,optional"
  repeated uint64 ids = 1;
  // @gotags: form:"phone,optional" json:"phone,optional"
  string phone = 2;
  // @gotags: form:"name,optional" json:"name,optional"
  string name = 3;
  // @gotags: form:"limit,optional,default=20" json:"limit,optional,default=20"
  int32 limit = 4;
  // @gotags: form:"offset,optional,default=0" json:"offset,optional,default=0"
  int32 offset = 5;
}

// GetUserInfoResp
message GetUserInfoResp {
  repeated UserInfo data = 1;
}

// UpdateInfoReq
message UpdateInfoReq {
  // @gotags: json:"user_name,optional"
  string user_name = 1;
  // @gotags: json:"gender,optional"
  int32 gender = 2;
  // @gotags: json:"avatar,optional"
  string avatar = 3;
  // @gotags: json:"join_type,optional"
  int32 join_type = 4;
  // @gotags: json:"personal_signature,optional"
  string personal_signature = 5;
}

// GetFriendsReq
message GetFriendsReq {}

// GetFriendsResp
message GetFriendsResp {
  repeated Friend data = 1;
}

// CreateFriendReq
message CreateFriendReq {
  // @gotags: json:"friend_id"
  uint64 friend_id = 1;
  // @gotags: json:"source,optional"
  int32 source = 2;
  // @gotags: json:"remark,optional"
  string remark = 3;
}

// UpdateFriendReq
message UpdateFriendReq {
  // @gotags: json:"friend_id"
  uint64 friend_id = 1;
  // @gotags: json:"remark,optional"
  string remark = 2;
  // @gotags: json:"blocked,optional"
  bool blocked = 3;
  // @gotags: json:"starred,optional"
  bool starred = 4;
}

// DeleteFriendReq
message DeleteFriendReq {
  // @gotags: json:"friend_id"
  uint64 friend_id = 1;
}

// NewFriendApplyReq
message NewFriendApplyReq {
  // @gotags: json:"to_user_id"
  uint64 to_user_id = 1;
  // @gotags: json:"apply_msg,optional"
  string apply_msg = 2;
  // @gotags: json:"source,optional"
  int32 source = 3;
}

// NewFriendApplyResp
message NewFriendApplyResp {
  FriendRequest data = 1;
}

// HandleFriendApplyReq
message HandleFriendApplyReq {
  // @gotags: json:"request_id"
  uint64 request_id = 1;
  // @gotags: json:"result"
  int32 result = 2;
  // @gotags: json:"reject_reason,optional"
  string reject_reason = 3;
}

// GetPendingFriendAppliesReq
message GetPendingFriendAppliesReq {}

// GetPendingFriendAppliesResp
message GetPendingFriendAppliesResp {
  repeated FriendRequest data = 1;
}

// SearchFriendReq
message SearchFriendReq {
  // @gotags: form:"name,optional" json:"name,optional"
  string name = 1;
  // @gotags: form:"id,optional" json:"id,optional"
  uint64 id = 2;
  // @gotags: form:"phone,optional" json:"phone,optional"
  string phone = 3;
  // @gotags: form:"limit,optional,default=30" json:"limit,optional,default=30"
  int32 limit = 4;
  // @gotags: form:"offset,optional,default=0" json:"offset,optional,default=0"
  int32 offset = 5;
}

// SearchFriendResp
message SearchFriendResp {
  repeated UserInfo data = 1;
  int64 total = 2;
}

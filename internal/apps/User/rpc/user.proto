syntax = "proto3";

package user;

option go_package = "./user";

// ========== 通用定义 ==========

message EmptyResp {}


// ========== 用户信息 ==========

message UserInfo {
  uint64 user_id = 1;
  string user_name = 2;
  string avatar = 3;
  int32 gender = 4;
  string phone = 5;
  int32 join_type = 6;
  string personal_signature = 7;
  int32 status = 8;
  int64 create_time = 9;
  int64 update_time = 10;
}

message CreateUserReq {
  string phone = 1;
  string name = 2;
  int32 gender = 3;
  int32 join_type = 4;
  string avatar = 5;
  string personal_signature = 6;
  string password = 7;
}

message CreateUserResp {
  uint64 user_id = 1;
}

message GetUserInfoReq {
  repeated uint64 ids = 1;
  string phone = 2;
  string name = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message GetUserInfoResp {
  repeated UserInfo data = 1;
}

message UpdateInfoReq {
  uint64 user_id = 1;
  string name = 2;
  int32 gender = 3;
  int32 join_type = 4;
  string avatar = 5;
  string personal_signature = 6;
}

message VerifyPasswordReq {
  uint64 user_id = 1;
  string password = 2;
}

message VerifyPasswordResp {
  bool valid = 1;
}

// ========== 好友信息 ==========

message Friend {
  uint64 user_id = 1;           // 用户ID（我）
  uint64 friend_id = 2;         // 好友ID（对方）
  string remark = 3;            // 好友备注名
  int32 source = 4;             // 好友来源
  bool blocked = 5;             // 是否拉黑
  bool starred = 6;             // 是否星标

  int64 create_time = 9;        // 成为好友时间
  string extra = 10;            // 扩展字段
}

message FriendRequest {
  uint64 id = 1;                // 申请记录ID
  uint64 from_user_id = 2;      // 申请人ID
  uint64 to_user_id = 3;        // 接收人ID
  string apply_msg = 4;         // 申请理由
  int32 status = 5;       // 申请状态
  int32 source = 6;              // 申请来源
  int64 request_time = 7;       // 申请时间
  int64 handle_time = 8;        // 处理时间
  string reject_reason = 9;     // 拒绝原因
}

// ========== 好友管理 ==========

message GetFriendsReq {
  uint64 user_id = 1;
}

message GetFriendsResp {
  repeated Friend data = 1;
}

message CreateFriendReq {
  uint64 user_id = 1;
  uint64 friend_id = 2;
  string remark = 3;
  int32 source = 4;
}

message CreateFriendResp {
  Friend data = 1;
}

message UpdateFriendReq {
  uint64 user_id = 1;
  uint64 friend_id = 2;
  string remark = 3;
  bool blocked = 4;
  bool starred = 5;
}

message UpdateFriendResp {
  Friend data = 1;
}

message DeleteFriendReq {
  uint64 user_id = 1;
  uint64 friend_id = 2;
}

// ========== 好友申请 ==========

message NewFriendApplyReq {
  uint64 from_user_id = 1;
  uint64 to_user_id = 2;
  string apply_msg = 3;
  int32 source = 4;
}

message NewFriendApplyResp {
  FriendRequest data = 1;
  Friend friend = 2; // Returns Friend if join_type is Direct
}

message HandleFriendApplyReq {
  uint64 id = 1;                // 申请记录ID
  uint64 operator_id = 2;       // 操作者ID
  int32 status = 3;       // 处理结果
  string reject_reason = 4;     // 拒绝原因
}

message HandleFriendApplyResp {
  FriendRequest data = 1;
}

message GetPendingFriendAppliesReq {
  uint64 user_id = 1;
}

message GetPendingFriendAppliesResp {
  repeated FriendRequest data = 1;
}

// ========== 服务定义 ==========

service User {
  // 用户管理
  rpc CreateUser(CreateUserReq) returns (CreateUserResp);
  rpc GetUserInfo(GetUserInfoReq) returns (GetUserInfoResp);
  rpc UpdateInfo(UpdateInfoReq) returns (EmptyResp);
  rpc VerifyPassword(VerifyPasswordReq) returns (VerifyPasswordResp);

  // 好友管理
  rpc GetFriends(GetFriendsReq) returns (GetFriendsResp);
  rpc CreateFriend(CreateFriendReq) returns (CreateFriendResp);
  rpc UpdateFriend(UpdateFriendReq) returns (UpdateFriendResp);
  rpc DeleteFriend(DeleteFriendReq) returns (EmptyResp);

  // 好友申请
  rpc NewFriendApply(NewFriendApplyReq) returns (NewFriendApplyResp);
  rpc HandleFriendApply(HandleFriendApplyReq) returns (HandleFriendApplyResp);
  rpc GetPendingFriendApplies(GetPendingFriendAppliesReq) returns (GetPendingFriendAppliesResp);
}

syntax = "proto3";

package types;

option go_package = "./;types";

message PolicyToken {
  // @gotags: json:"policy"
  string policy = 1;
  // @gotags: json:"security_token"
  string security_token = 2;
  // @gotags: json:"x_oss_signature_version"
  string x_oss_signature_version = 3;
  // @gotags: json:"x_oss_credential"
  string x_oss_credential = 4;
  // @gotags: json:"x_oss_date"
  string x_oss_date = 5;
  // @gotags: json:"signature"
  string signature = 6;
  // @gotags: json:"host"
  string host = 7;
  // @gotags: json:"dir"
  string dir = 8;
  // @gotags: json:"callback"
  string callback = 9;
}

message CallbackParam {
  // @gotags: json:"callbackUrl"
  string callbackUrl = 1;
  // @gotags: json:"callbackBody"
  string callbackBody = 2;
  // @gotags: json:"callbackBodyType"
  string callbackBodyType = 3;
}

message CallbackData {
  // @gotags: form:"id,optional" json:"id,optional"
  uint64 id = 1;
  // @gotags: form:"file_type,optional" json:"file_type,optional"
  int32 file_type = 2;
  // @gotags: form:"width,optional" json:"width,optional"
  int32 width = 3;
  // @gotags: form:"height,optional" json:"height,optional"
  int32 height = 4;
  // @gotags: form:"size,optional" json:"size,optional"
  uint64 size = 5;
  // @gotags: form:"file_name,optional" json:"file_name,optional"
  string file_name = 6;
  // @gotags: form:"mime_type,optional" json:"mime_type,optional"
  string mime_type = 7;
}

message GetPostSignatureReq {
  // @gotags: form:"file_type,optional" json:"file_type,optional"
  int32 file_type = 1;
  // @gotags: form:"file_name,optional" json:"file_name,optional"
  string file_name = 2;
}

message GetPostSignatureResp {
  bool is_exits = 1;
  PolicyToken policy = 2;
}

message GetAccessUrlReq {
  // @gotags: form:"file_key,optional" json:"file_key,optional"
  string file_key = 1;
  // @gotags: form:"file_type,optional" json:"file_type,optional"
  FileType file_type = 2;
  // @gotags: form:"oss_process,optional" json:"oss_process,optional"
  string oss_process = 3;
  // @gotags: form:"method,optional" json:"method,optional"
  GetMethod method = 4;
}

message GetAccessUrlResp {
  // @gotags: json:"access_url"
  string access_url = 1;
}

enum FileType {
  FileTypeAvatar    = 0;
	FileTypeChatImage = 1;
	FileTypeChatFile  = 2;
}

enum GetMethod {
  MethodGet = 0;
  MethodHead = 1;
}
syntax = "proto3";

package common;

option go_package = "./common";

message ErrorResp {
    int32 code = 1;
    string message = 2;
    string rawError = 3;
}

// API 通用响应包装
message ApiResponse {
    int32 code = 1;         // 状态码 (0表示成功)
    string message = 2;     // 响应提示信息
    bytes data = 3;         // 响应数据(序列化后的pb字节流)
}

// ==================== 主消息包装 ====================

// WebSocket传输的顶层消息
message WSMessage {
  uint64 route_target = 1;         // 路由目标
  TargetType route_target_type = 2; // 路由目标类型
  int64 timestamp = 3;            // 时间戳(毫秒)
  MessageType type = 4;           // 消息类型
  bytes payload = 5;              // 具体消息内容(根据type解析)
  int32 version = 6;              // 协议版本号
}

enum TargetType {
    USER = 0;
    GROUP = 1;
}

// ws连接状态
enum ConnectionState {
    DISCONNECTED = 0;
    CONNECTING = 1;
    CONNECTED = 2;
    RECONNECTING = 3;
}

// 消息类型枚举
enum MessageType {
  UNKNOWN = 0;
  
  // 单聊消息 100-199
  CHAT_TEXT = 100;                // 文本消息
  CHAT_IMAGE = 101;               // 图片消息
  CHAT_VIDEO = 102;               // 视频消息
  CHAT_AUDIO = 103;               // 语音消息
  CHAT_FILE = 104;                // 文件消息
  CHAT_LOCATION = 105;            // 位置消息
  CHAT_CUSTOM = 106;              // 自定义消息
  
  // 群聊消息 200-299
  GROUP_TEXT = 200;               // 群文本消息
  GROUP_IMAGE = 201;              // 群图片消息
  GROUP_VIDEO = 202;              // 群视频消息
  GROUP_AUDIO = 203;              // 群语音消息
  GROUP_FILE = 204;               // 群文件消息
  GROUP_NOTICE = 205;             // 群公告
  
  // 消息状态 300-399
  MSG_ACK = 300;                  // 消息确认
  MSG_READ = 301;                 // 消息已读
  MSG_DELIVERED = 302;            // 消息送达
  MSG_RECALL = 303;               // 消息撤回
  MSG_DELETE = 304;               // 消息删除
  
  // 用户状态 400-499
  USER_ONLINE = 400;              // 用户上线
  USER_OFFLINE = 401;             // 用户下线
  USER_TYPING = 402;              // 正在输入
  USER_STATUS_CHANGE = 403;       // 状态变更
  
  // 群组操作 500-599
  GROUP_CREATE = 500;             // 创建群组
  GROUP_DISMISS = 501;            // 解散群组
  GROUP_JOIN = 502;               // 加入群组
  GROUP_LEAVE = 503;              // 离开群组
  GROUP_KICK = 504;               // 踢出群组
  GROUP_INVITE = 505;             // 邀请入群
  GROUP_INFO_UPDATE = 506;        // 群信息更新
  
  // 通知类 600-699
  NOTIFICATION = 600;             // 系统通知
  FRIEND_REQUEST = 601;           // 好友请求
  FRIEND_ADD = 602;               // 添加好友
  GROUP_REQUEST = 603;            // 群请求
  APPLY_ACCEPT = 604;             // 接受申请
  APPLY_REJECT = 605;             // 拒绝申请
  
  // 错误响应 900-999
  ERROR = 900;                    // 错误消息
}

// ==================== 聊天消息 ====================

// 基础消息信息
message BaseMessage {
  string msg_id = 1;               // 消息ID
  string client_id = 2;           // 客户端ID
  string session_id = 3;          // 会话ID
  uint64 from_user_id = 4;        // 发送者ID
  uint64 target = 5;              // 目标ID (私聊=to_user_id, 群聊=group_id, 与ConversationType配套使用)
  reserved 6;                     // 原 group_id 字段已合并至 target
  int64 send_time = 7;            // 发送时间
  int32 msg_seq = 8;              // 消息序号
  MessageStatus status = 9;       // 消息状态
  map<string, string> ext = 10;    // 扩展字段
}

// 消息状态 (Matched with MessageStatus in message.proto)
enum MessageStatus {
  MESSAGE_STATUS_UNSPECIFIED = 0; // 未指定
  MESSAGE_STATUS_SENDING = 1;     // 发送中
  MESSAGE_STATUS_SENT = 2;        // 已发送 (服务端已收到)
  MESSAGE_STATUS_DELIVERED = 3;   // 已送达 (对方已收到)
  MESSAGE_STATUS_READ = 4;        // 已读
  MESSAGE_STATUS_RECALLED = 5;    // 已撤回
  MESSAGE_STATUS_FAILED = 6;      // 发送失败 (Added, useful for frontend)
}

// 文本消息
message TextMessage {
  BaseMessage base = 1;
  string content = 2;             // 文本内容
  repeated AtInfo at_list = 3;    // @信息列表
}

// @信息
message AtInfo {
  uint64 user_id = 1;             // 被@的用户ID
  string user_name = 2;           // 被@的用户名
  int32 offset = 3;               // 在文本中的偏移量
  int32 length = 4;               // 长度
}

// 图片消息
message ImageMessage {
  BaseMessage base = 1;
  string url = 2;                 // 图片URL
  string thumbnail_url = 3;       // 缩略图URL
  int32 width = 4;                // 宽度
  int32 height = 5;               // 高度
  int64 size = 6;                 // 文件大小(字节)
  string format = 7;              // 图片格式(jpg/png/gif等)
}

// 视频消息
message VideoMessage {
  BaseMessage base = 1;
  string url = 2;                 // 视频URL
  string thumbnail_url = 3;       // 视频封面URL
  int32 duration = 4;             // 时长(秒)
  int32 width = 5;                // 宽度
  int32 height = 6;               // 高度
  int64 size = 7;                 // 文件大小
  string format = 8;              // 视频格式
}

// 语音消息
message AudioMessage {
  BaseMessage base = 1;
  string url = 2;                 // 语音URL
  int32 duration = 3;             // 时长(秒)
  int64 size = 4;                 // 文件大小
  string format = 5;              // 音频格式(mp3/wav/amr等)
  bool is_read = 6;               // 是否已读
}

// 文件消息
message FileMessage {
  BaseMessage base = 1;
  string url = 2;                 // 文件URL
  string file_name = 3;           // 文件名
  int64 size = 4;                 // 文件大小
  FileType file_type = 5;           // 文件类型
  string md5 = 6;                 // 文件MD5
}

enum FileType {
  FILE_TYPE_UNSPECIFIED = 0;
  FILE_TYPE_AVATAR = 1;           // 头像
  FILE_TYPE_CHAT_IMAGE = 2;       // 聊天图片
  FILE_TYPE_CHAT_FILE = 3;        // 聊天文件
}

// 位置消息
message LocationMessage {
  BaseMessage base = 1;
  double latitude = 2;            // 纬度
  double longitude = 3;           // 经度
  string address = 4;             // 地址描述
  string title = 5;               // 位置名称
}

// 自定义消息
message CustomMessage {
  BaseMessage base = 1;
  string custom_type = 2;         // 自定义类型
  string data = 3;                // JSON格式的自定义数据
}

// ==================== 消息状态相关 ====================

// 消息确认(ACK)
message MessageAck {
  string msg_id = 1;               // 消息ID
  int32  seq = 2;                  // 序列号
  string client_id = 3;            // 客户端ID
  string session_id = 4;           // 会话ID
  AckStatus status = 5;           // 确认状态
  string error_msg = 6;           // 错误信息
}

enum AckStatus {
  ACK_STATUS_SUCCESS = 0;         // 成功
  ACK_STATUS_FAILED = 1;          // 失败
  ACK_STATUS_DUPLICATE = 2;       // 重复消息
}

// 消息已读
message MessageRead {
  uint64 user_id = 1;             // 用户ID
  string conversation_id = 2;     // 会话ID
  repeated int64 msg_ids = 3;     // 已读消息ID列表
  int64 read_time = 4;            // 已读时间
}

// 消息撤回
message MessageRecall {
  int64 msg_id = 1;               // 消息ID
  uint64 user_id = 2;             // 撤回者ID
  string conversation_id = 3;     // 会话ID
  int64 recall_time = 4;          // 撤回时间
  string reason = 5;              // 撤回原因
}

// ==================== 用户状态 ====================

// 用户在线状态
message UserOnlineStatus {
  uint64 user_id = 1;             // 用户ID
  OnlineStatus status = 2;        // 在线状态
  int64 last_active_time = 3;     // 最后活跃时间
}

enum OnlineStatus {
  ONLINE_STATUS_OFFLINE = 0;      // 离线
  ONLINE_STATUS_ONLINE = 1;       // 在线
  ONLINE_STATUS_AWAY = 2;         // 离开
  ONLINE_STATUS_BUSY = 3;         // 忙碌
  ONLINE_STATUS_INVISIBLE = 4;    // 隐身
}

// 正在输入
message TypingStatus {
  uint64 user_id = 1;             // 用户ID
  string conversation_id = 2;     // 会话ID
  bool is_typing = 3;             // 是否正在输入
  int64 timestamp = 4;            // 时间戳
}

// ==================== 群组操作 ====================

// 群组信息 (对标 model/group.go)
message GroupInfo {
  uint64 id = 1;                  // 群组ID
  uint64 owner_id = 2;            // 群主ID
  string name = 3;                // 群组名称
  string avatar = 4;              // 群头像
  string notice = 5;              // 群公告
  int32 join_type = 6;            // 加群方式
  int32 member_count = 7;         // 成员数量
  int64 create_time = 8;          // 创建时间
  int64 update_time = 9;          // 更新时间
}

// 群成员信息 (对标 model/group_member.go)
message GroupMember {
  uint64 group_id = 1;            // 群组ID
  uint64 user_id = 2;             // 用户ID
  GroupRole role = 3;             // 群角色
  string nickname = 4;            // 群昵称
  int64 mute_until = 5;           // 禁言截止时间
  int64 joined_at = 8;            // 加入时间
  string extra = 9;               // 扩展字段
}

enum GroupRole {
  GROUP_ROLE_UNSPECIFIED = 0;     // 未知
  GROUP_ROLE_OWNER = 1;           // 群主
  GROUP_ROLE_ADMIN = 2;           // 管理员
  GROUP_ROLE_MEMBER = 3;          // 普通成员
}

// 群申请 (Matched with GroupRequest in group.proto)
message GroupApply {
  uint64 id = 1;                  // 申请ID (group.proto: id)
  uint64 sender_id = 2;           // 发起者ID (group.proto: from_user_id)
  uint64 group_id = 3;            // 群组ID (group.proto: group_id)
  string apply_msg = 4;           // 申请消息 (group.proto: apply_msg)
  GroupApplyStatus status = 5;    // 申请状态 (group.proto: status)
  uint64 handler_id = 6;          // 处理者ID (group.proto: handler_id)
  int64 request_time = 7;         // 申请时间 (group.proto: request_time)
  int64 handle_time = 8;          // 处理时间 (group.proto: handle_time)
  string reject_reason = 9;       // 拒绝原因 (group.proto: reject_reason)
}

enum GroupApplyStatus {
  GROUP_APPLY_STATUS_UNSPECIFIED = 0; // 未知
  GROUP_APPLY_STATUS_PENDING = 1;     // 待处理
  GROUP_APPLY_STATUS_ACCEPTED = 2;    // 已同意
  GROUP_APPLY_STATUS_REJECTED = 3;    // 已拒绝
  GROUP_APPLY_STATUS_IGNORED = 4;     // 已忽略
}

// 群组操作通知
message GroupNotification {
  uint64 group_id = 1;            // 群组ID
  GroupOperationType op_type = 2; // 操作类型
  uint64 operator_id = 3;         // 操作者ID
  repeated uint64 target_ids = 4; // 目标用户ID列表
  int64 op_time = 5;              // 操作时间
  string reason = 6;              // 操作原因
  GroupInfo group_info = 7;       // 群组信息
}

enum GroupOperationType {
  GROUP_OP_CREATE = 0;            // 创建
  GROUP_OP_DISMISS = 1;           // 解散
  GROUP_OP_JOIN = 2;              // 加入
  GROUP_OP_LEAVE = 3;             // 离开
  GROUP_OP_KICK = 4;              // 踢出
  GROUP_OP_INVITE = 5;            // 邀请
  GROUP_OP_UPDATE_INFO = 6;       // 更新信息
  GROUP_OP_MUTE = 7;              // 禁言
  GROUP_OP_UNMUTE = 8;            // 取消禁言
}

message Conversation {
  string conversation_id = 1;     // 会话ID
  ConversationType type = 2;      // 会话类型
  string last_content = 3;        // 最后一条消息摘要文本
  int64 max_seq = 4;
  uint64 last_sender = 5;
  int64 last_message_time = 6;    // 最后消息时间
  int64 unread_count = 7;         // 未读消息数
  int64 create_time = 8;          // 创建时间
  int64 update_time = 9;         // 更新时间
  bool is_top = 10;                // 是否置顶
  bool is_disturb = 11;           // 是否免打扰
  MessageType last_msg_type = 12; // 最后消息类型 (用于渲染图标)
}

enum ConversationType {
  CONVERSATION_TYPE_PRIVATE = 0;  // 私聊
  CONVERSATION_TYPE_GROUP = 1;    // 群聊
}

// ==================== 通知消息 ====================

// 系统通知
message SystemNotification {
  string notification_id = 1;     // 通知ID
  NotificationType type = 2;      // 通知类型
  string title = 3;               // 标题
  string content = 4;             // 内容
  int64 create_time = 5;          // 创建时间
  map<string, string> data = 6;   // 附加数据
}

enum NotificationType {
  NOTIFICATION_TYPE_SYSTEM = 0;   // 系统通知
  NOTIFICATION_TYPE_ANNOUNCEMENT = 1; // 公告
  NOTIFICATION_TYPE_ACTIVITY = 2; // 活动通知
  NOTIFICATION_TYPE_SECURITY = 3; // 安全通知
}

// 好友关系来源
enum FriendSource {
  FRIEND_SOURCE_UNSPECIFIED = 0;  // 未知
  FRIEND_SOURCE_SEARCH = 1;       // 搜索添加
  FRIEND_SOURCE_GROUP = 2;        // 群聊添加
  FRIEND_SOURCE_RECOMMEND = 3;    // 系统推荐
}

// 好友信息 (对标 model/user_friend.go)
message Friend {
  uint64 user_id = 1;             // 用户ID（我）
  uint64 friend_id = 2;           // 好友ID（对方）
  string remark = 3;              // 好友备注名
  bool starred = 4;               // 是否星标
  bool blocked = 5;               // 是否拉黑
  FriendSource source = 6;        // 来源
  int64 create_time = 9;          // 成为好友时间
  string extra = 10;              // 扩展字段
}

// 好友请求 (对标 model/user_friend_apply.go)
message FriendRequest {
  uint64 id = 1;                  // 申请记录ID (user.proto: id)
  uint64 from_user_id = 2;        // 发起者ID (user.proto: from_user_id)
  uint64 to_user_id = 3;          // 接收者ID (user.proto: to_user_id)
  string apply_msg = 4;           // 申请理由 (user.proto: apply_msg)
  ApplyStatus status = 5;         // 申请状态 (user.proto: status int32)
  ApplySource source = 6;         // 来源 (user.proto: source int32)
  int64 request_time = 7;         // 申请时间 (user.proto: request_time)
  int64 handle_time = 8;          // 处理时间 (user.proto: handle_time)
  string reject_reason = 9;       // 拒绝原因 (user.proto: reject_reason)
}

enum ApplyStatus {
  APPLY_STATUS_UNSPECIFIED = 0;   // 未知
  APPLY_STATUS_PENDING = 1;       // 待处理
  APPLY_STATUS_AGREED = 2;        // 已同意
  APPLY_STATUS_REJECTED = 3;      // 已拒绝
  APPLY_STATUS_IGNORED = 4;       // 已忽略
}

enum ApplySource {
  APPLY_SOURCE_UNSPECIFIED = 0;
  APPLY_SOURCE_SEARCH_ACCOUNT = 1;// 搜索账号
  APPLY_SOURCE_SEARCH_PHONE = 2;  // 搜索手机
  APPLY_SOURCE_SEARCH_NAME = 3;   // 搜索昵称
  APPLY_SOURCE_FROM_GROUP = 4;    // 群组添加
  APPLY_SOURCE_FROM_RECOMMEND = 5;// 系统推荐
}

// ==================== 用户信息 ====================

message UserInfo {
  uint64 user_id = 1;             // 用户ID
  string user_name = 2;           // 用户名
  string avatar = 3;              // 头像
  Gender gender = 4;              // 性别
  string phone = 5;               // 手机号
  JoinType join_type = 6;         // 加入类型
  UserStatus status = 7;          // 状态
  string personal_signature = 8;  // 签名
  int64 create_time = 9;          // 创建时间
  int64 update_time = 10;         // 更新时间
}

enum Gender {
  GENDER_UNSPECIFIED = 0;
  GENDER_MALE = 1;
  GENDER_FEMALE = 2;
  GENDER_UNKNOWN = 3;             // TS: Unknown=3
}

enum JoinType {
  JOIN_TYPE_UNSPECIFIED = 0;
  JOIN_TYPE_AFTER_APPROVAL = 1;   // 同意后加入
  JOIN_TYPE_DIRECT = 2;           // 直接加入
}

enum UserStatus {
  USER_STATUS_DISABLED = 0;       // 禁用
  USER_STATUS_NORMAL = 1;         // 正常
}

// ==================== 错误消息 ====================

// 错误响应
message ErrorMessage {
  int32 error_code = 1;           // 错误码
  string error_msg = 2;           // 错误信息
  string session_id = 3;          // 关联会话ID
  string request_id = 4;          // 关联的请求ID
  map<string, string> details = 5; // 错误详情
}

// 常见错误码定义
enum ErrorCode {
  OK = 0;
  INVALID_PARAM = 1001;           // 参数无效
  UNAUTHORIZED = 1002;            // 未授权
  TOKEN_EXPIRED = 1003;           // Token过期
  USER_NOT_FOUND = 1004;          // 用户不存在
  MESSAGE_TOO_LARGE = 1005;       // 消息过大
  RATE_LIMIT = 1006;              // 频率限制
  SERVER_ERROR = 5000;            // 服务器错误
  SERVICE_UNAVAILABLE = 5001;     // 服务不可用
}
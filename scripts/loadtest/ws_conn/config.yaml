# WebSocket 连接数压测配置
# 用法：go run ./scripts/loadtest/ws_conn -config config.yaml
# 命令行 flag（-host/-n 等）优先级高于此配置文件，可用于临时覆盖。

# 网关地址
host: "www.imflow.cloud:30443"
# WebSocket 路径
path: "/ws"
# 是否使用 wss（TLS）
tls: true
# 跳过 TLS 证书校验（仅 tls=true 时有效）
insecure: false

# Token 过期时间（秒）
jwt_expire: 86400

# 目标连接数，脚本将自动生成对应数量的账号和 Token
num: 500
# 起始 UserID
start_user_id: 1000001
# 建连爬升速率（条/秒）
rate: 200
# 全部建连后保持时长（支持 Go duration 格式，如 30s / 2m）
hold: "30s"
# 单条连接握手超时
dial_timeout: "10s"

name: IM2 CD

on:
  workflow_run:
    workflows: ["IM2 CI"]
    types:
      - completed
    branches: [ master ]

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork == false && github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push All Services
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
        run: |
          # 使用 git commit sha 作为 tag
          TAG=${GITHUB_SHA::7}
          # 如果是 tag 触发，则使用 tag 名
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          fi
          
          echo "Building and pushing to $REGISTRY with TAG: $TAG"
          chmod +x ./scripts/docker.sh
          # 注入环境变量并执行脚本
          TAG=$TAG REGISTRY=$REGISTRY ./scripts/docker.sh build-push

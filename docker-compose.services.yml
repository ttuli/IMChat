version: '3.8'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "300m"
    max-file: "5"
services:
  # ---------------
  # IM2 RPC 服务层（按依赖顺序启动）
  # ---------------
  idgen-rpc:
    container_name: im2_idgen_rpc
    image: ${REGISTRY}:idgen-rpc-latest
    env_file: .env
    ports:
      - "${IDGEN_RPC_PORT}:${IDGEN_RPC_PORT}"
    logging: *default-logging
    restart: on-failure

  user-rpc:
    container_name: im2_user_rpc
    image: ${REGISTRY}:user-rpc-latest
    env_file: .env
    ports:
      - "${USER_RPC_PORT}:${USER_RPC_PORT}"
    logging: *default-logging
    restart: on-failure

  auth-rpc:
    container_name: im2_auth_rpc
    image: ${REGISTRY}:auth-rpc-latest
    env_file: .env
    ports:
      - "${AUTH_RPC_PORT}:${AUTH_RPC_PORT}"
    logging: *default-logging
    restart: on-failure

  group-rpc:
    container_name: im2_group_rpc
    image: ${REGISTRY}:group-rpc-latest
    env_file: .env
    ports:
      - "${GROUP_RPC_PORT}:${GROUP_RPC_PORT}"
    logging: *default-logging
    restart: on-failure

  message-rpc:
    container_name: im2_message_rpc
    image: ${REGISTRY}:message-rpc-latest
    env_file: .env
    ports:
      - "${MESSAGE_RPC_PORT}:${MESSAGE_RPC_PORT}"
    logging: *default-logging
    restart: on-failure

  llm-rpc:
    container_name: im2_llm_rpc
    image: ${REGISTRY}:llm-rpc-latest
    env_file: .env
    ports:
      - "${LLM_RPC_PORT}:${LLM_RPC_PORT}"
    logging: *default-logging
    restart: on-failure

  llm-python:
    container_name: im2_llm_python
    image: ${REGISTRY}:llm-python-latest
    env_file: .env
    ports:
      - "${LLM_PYTHON_PORT}:${LLM_PYTHON_PORT}"
    logging: *default-logging
    restart: on-failure

  # ---------------
  # IM2 API 服务层
  # ---------------
  user-api:
    container_name: im2_user_api
    image: ${REGISTRY}:user-api-latest
    env_file: .env
    ports:
      - "${USER_API_PORT}:${USER_API_PORT}"
    logging: *default-logging
    restart: on-failure

  auth-api:
    container_name: im2_auth_api
    image: ${REGISTRY}:auth-api-latest
    env_file: .env
    ports:
      - "${AUTH_API_PORT}:${AUTH_API_PORT}"
    logging: *default-logging
    restart: on-failure

  group-api:
    container_name: im2_group_api
    image: ${REGISTRY}:group-api-latest
    env_file: .env
    ports:
      - "${GROUP_API_PORT}:${GROUP_API_PORT}"
    logging: *default-logging
    restart: on-failure

  message-api:
    container_name: im2_message_api
    image: ${REGISTRY}:message-api-latest
    env_file: .env
    ports:
      - "${MESSAGE_API_PORT}:${MESSAGE_API_PORT}"
    logging: *default-logging
    restart: on-failure

  file-api:
    container_name: im2_file_api
    image: ${REGISTRY}:file-api-latest
    env_file: .env
    ports:
      - "${FILE_API_PORT}:${FILE_API_PORT}"
    logging: *default-logging
    restart: on-failure

  llm-api:
    container_name: im2_llm_api
    image: ${REGISTRY}:llm-api-latest
    env_file: .env
    ports:
      - "${LLM_API_PORT}:${LLM_API_PORT}"
    logging: *default-logging
    restart: on-failure

  # ---------------
  # IM2 WebSocket Gateway
  # ---------------
  websocket:
    container_name: im2_websocket
    image: ${REGISTRY}:websocket-latest
    env_file: .env
    ports:
      - "${WEBSOCKET_PORT}:${WEBSOCKET_PORT}"
    logging: *default-logging
    restart: on-failure

apiVersion: v1
kind: Namespace
metadata:
  name: im2
---
# ==========================================
# Auth API
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api
  namespace: im2
  labels:
    app: auth-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-api
  template:
    metadata:
      labels:
        app: auth-api
    spec:
      containers:
        - name: auth-api
          image: imchat:auth-api-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8022
          envFrom:
            - configMapRef:
                name: im2-config
---
apiVersion: v1
kind: Service
metadata:
  name: auth-api
  namespace: im2
  labels:
    app: auth-api
spec:
  type: ClusterIP
  ports:
    - port: 8022
      targetPort: 8022
      protocol: TCP
  selector:
    app: auth-api


---
# ==========================================
# WebSocket Gateway
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata: # Deployment自身信息标签
  name: websocket
  namespace: im2
  labels:
    app: websocket 
spec: 
  replicas: 1
  selector:
    matchLabels:
      app: websocket # Deployment要管理的Pod标签
  template:
    metadata:
      labels:
        app: websocket # Deployment关联的Pod标签
    spec:
      containers:
        - name: websocket
          image: imchat:websocket-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8009 # 文档性声明，不写也能通信，但写了便于阅读和工具识别
          envFrom:
            - configMapRef:
                name: im2-config
---
apiVersion: v1
kind: Service
metadata:
  name: websocket
  namespace: im2
  labels:
    app: websocket
spec:
  # ClusterIP只在集群内部可访问，有一个虚拟 IP
  # NodePort在每个节点上开放端口，集群外可访问
  # LoadBalancer对接云厂商负载均衡器，公网可访问
  type: ClusterIP
  ports:
    - port: 8009
      targetPort: 8009
      protocol: TCP
  selector:
    app: websocket # Service选择的Pod标签

# IM2 ApisixRoute 路由清单
# 通过 APISIX Ingress Controller 为各 API 服务注册路由
# 将所有 API 服务的流量通过 APISIX 转发到对应的 K8s Service
#
# 部署方式:
#   kubectl apply -f deploy/k8s/apisix-routes.yaml -n im2
#
# 访问入口:
#   http://<node-a 公网IP>:30080/<路由前缀>

---
# Auth API: 认证相关 HTTP API（登录、注册、刷新/注销 Token）
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: auth-api-route
  namespace: im2
spec:
  http:
    - name: auth-api
      match:
        paths:
          - /auth/*
      backends:
        - serviceName: auth-api
          servicePort: 8022

---
# User API: 用户信息、好友相关 API
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: user-api-route
  namespace: im2
spec:
  http:
    - name: user-api
      match:
        paths:
          - /user/*
      backends:
        - serviceName: user-api
          servicePort: 8021
  
---
# Group API: 群组、成员、群申请相关 API
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: group-api-route
  namespace: im2
spec:
  http:
    - name: group-api
      match:
        paths:
          - /group/*
      backends:
        - serviceName: group-api
          servicePort: 8024

---
# Message API: 会话列表、历史消息等 HTTP API
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: message-api-route
  namespace: im2
spec:
  http:
    - name: message-api
      match:
        paths:
          - /message/*
      backends:
        - serviceName: message-api
          servicePort: 8025

---
# File API: 文件上传回调与上传签名 API
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: file-api-route
  namespace: im2
spec:
  http:
    - name: file-api
      match:
        paths:
          - /fileupload/*
      backends:
        - serviceName: file-api
          servicePort: 8023

---
# LLM API: 大模型相关 API
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: llm-api-route
  namespace: im2
spec:
  http:
    - name: llm-api
      match:
        paths:
          - /ai/*
      backends:
        - serviceName: llm-api
          servicePort: 8026

---
# WebSocket Gateway: 长连接网关
# 注意：enable_websocket: true 用于支持协议升级
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: websocket-route
  namespace: im2
spec:
  http:
    - name: websocket
      match:
        paths:
          - /ws
          - /ws/*
      websocket: true
      backends:
        - serviceName: websocket
          servicePort: 8009

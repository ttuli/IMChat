# ==========================================
# User RPC
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-rpc
  namespace: im2
  labels:
    app: user-rpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-rpc
  template:
    metadata:
      labels:
        app: user-rpc
    spec:
      containers:
        - name: user-rpc
          image: imchat:user-rpc-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 10000
          envFrom:
            - configMapRef:
                name: im2-config
---
apiVersion: v1
kind: Service
metadata:
  name: user-rpc
  namespace: im2
  labels:
    app: user-rpc
spec:
  type: ClusterIP
  ports:
    - port: 10000
      targetPort: 10000
      protocol: TCP
  selector:
    app: user-rpc

